<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-6 h-20 bg-[#f8f6f5] dark:bg-stone-900 shadow-[0_4px_0_0_rgba(0,0,0,0.04)]">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-white/50 transition-colors active:translate-y-0.5 duration-200">
<span class="material-symbols-outlined text-[#2a6900] text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-2xl tracking-tight text-[#2a6900]">Start Your Adventure</h1>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center pt-28 pb-12 px-6">
<div class="max-w-md w-full relative">
<!-- Mascot/Illustration Placement (Asymmetric) -->
<div class="absolute -top-16 -right-8 w-24 h-24 z-10 hidden md:block">
<img alt="EconoKids Mascot" class="w-full h-full drop-shadow-lg transform rotate-12" data-alt="A friendly, stylized 3D golden piggy bank mascot smiling and winking, high-quality toy texture, bright green background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB3t486Wj3ujRX4K3umZH8QDbQctRdLNceeyqHXcOwm5Lav_OZMNlJeuEJSwcSPRo9ni2aRS8GarHM3eZeangHll-w7rrbMEQV6ZPsCOnhPEUQAYtm7UwpfAnY_sjOwLE7mRDn9Z_oYcArn1-cCbHuxofCsLOKPL__VoTQDMQwPh-s9WDheuVgZKoBQik-SlfMfe1A7iIAwH-WWtDrI_qp1UgPTuNEQIe843d7ZaRKpZ8DCEnW54q1LvQ5QoIVUojz5Z9sydjiMV-w"/>
</div>
<!-- Content Canvas -->
<div class="bg-surface-container-low rounded-xl p-8 md:p-10 space-y-8">
<div class="text-center space-y-2">
<h2 class="font-headline font-extrabold text-4xl text-primary tracking-tight">Create Your Account</h2>
<p class="text-on-surface-variant font-medium">Join the fun and start earning gold!</p>
</div>
<!-- Signup Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="block font-bold text-on-secondary-container ml-2" for="player-name">Choose a Player Name</label>
<input class="w-full h-16 px-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/20 focus:border-primary focus:ring-4 focus:ring-primary-container/30 transition-all outline-none text-lg font-medium placeholder:text-outline-variant/50" id="player-name" placeholder="SuperStar2024" type="text"/>
</div>
<div class="space-y-2">
<label class="block font-bold text-on-secondary-container ml-2" for="password">Create a Password</label>
<input class="w-full h-16 px-6 rounded-xl bg-surface-container-lowest border-2 border-outline-variant/20 focus:border-primary focus:ring-4 focus:ring-primary-container/30 transition-all outline-none text-lg font-medium placeholder:text-outline-variant/50" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="w-full h-16 bg-primary text-on-primary font-headline font-extrabold text-xl rounded-xl chunky-button-primary transition-all flex items-center justify-center gap-2" type="submit">
                            SIGN UP!
                            <span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</form>
<!-- Illustration for Mobile -->
<div class="flex justify-center md:hidden pt-4">
<div class="bg-secondary-container p-4 rounded-full">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" data-icon="savings" style="font-variation-settings: 'FILL' 1;">savings</span>
</div>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center gap-2 text-primary font-bold hover:underline" href="/login">
                    Already have an account? Log in
                    <span class="material-symbols-outlined text-lg" data-icon="login">login</span>
</a>
</div>
</div>
</main>
<!-- Bottom Decorative Pattern (Tonal Shift) -->
<div class="h-24 w-full bg-surface-container-high flex items-end justify-center overflow-hidden">
<div class="flex gap-4 opacity-10 mb-[-1rem]">
<span class="material-symbols-outlined text-8xl" data-icon="payments">payments</span>
<span class="material-symbols-outlined text-8xl" data-icon="monetization_on">monetization_on</span>
<span class="material-symbols-outlined text-8xl" data-icon="account_balance">account_balance</span>
<span class="material-symbols-outlined text-8xl" data-icon="shopping_bag">shopping_bag</span>
<span class="material-symbols-outlined text-8xl" data-icon="star">star</span>
</div>
</div>
