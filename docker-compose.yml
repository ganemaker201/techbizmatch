services:
  db:
    image: postgres:16-alpine
    container_name: techbizmatch-db
    environment:
      POSTGRES_USER: tbm
      POSTGRES_PASSWORD: tbmpass
      POSTGRES_DB: techbizmatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbm -d techbizmatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: techbizmatch-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://tbm:tbmpass@db:5432/techbizmatch
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: techbizmatch-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
